<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07182E" />
      <stop offset="50%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <!-- Glowing Route Gradient -->
    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#00C2FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0.8" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  
  <!-- World Map Outline (Simplified/Abstract grid) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <!-- horizontal grid lines -->
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <!-- vertical grid lines -->
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
  </g>

  <!-- Abstract Glowing Continents -->
  <!-- North America -->
  <path d="M120,150 Q180,140 240,160 T300,240 Q250,290 200,260 T140,300 Z" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  <!-- South America -->
  <path d="M210,320 Q260,330 280,380 T220,480 Q190,440 200,380 Z" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  <!-- Eurasia / Africa -->
  <path d="M420,120 Q550,90 700,120 T780,240 Q680,290 600,250 T480,220 Z" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  <path d="M470,250 Q560,260 580,340 T500,450 Q460,400 460,320 Z" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
  
  <!-- Glowing Transit Routes -->
  <g filter="url(#glow)">
    <!-- Route 1: AMD (550,220) to Europe (450,150) -->
    <path d="M550,220 Q500,160 450,150" fill="none" stroke="url(#routeGrad)" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Route 2: AMD (550,220) to USA (240,180) -->
    <path d="M550,220 Q390,130 240,180" fill="none" stroke="url(#routeGrad)" stroke-width="2" />
    <!-- Route 3: AMD (550,220) to Australia (720,400) -->
    <path d="M550,220 Q650,330 720,400" fill="none" stroke="url(#routeGrad)" stroke-width="2" stroke-dasharray="8,4" />
  </g>

  <!-- Glowing Hub Markers -->
  <circle cx="550" cy="220" r="8" fill="#00C2FF" filter="url(#glow)" />
  <circle cx="550" cy="220" r="4" fill="#ffffff" />
  <text x="550" y="205" fill="#00C2FF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">AMD (HQ)</text>

  <circle cx="450" cy="150" r="5" fill="#0057FF" />
  <circle cx="240" cy="180" r="5" fill="#0057FF" />
  <circle cx="720" cy="400" r="5" fill="#0057FF" />

  <!-- Airplane vector overlay -->
  <g transform="translate(380, 180) rotate(-22) scale(0.8)" filter="url(#glow)">
    <!-- Airplane Body -->
    <path d="M-30,0 L15,-5 L35,0 L15,5 Z" fill="#ffffff" />
    <!-- Wings -->
    <path d="M-5,-3 L0,-35 L12,-35 L5,-3 Z" fill="#00C2FF" />
    <path d="M-5,3 L0,35 L12,35 L5,3 Z" fill="#00C2FF" />
    <!-- Tail -->
    <path d="M-25,0 L-32,-12 L-28,-12 L-20,0 Z" fill="#FFB800" />
    <path d="M-25,0 L-32,12 L-28,12 L-20,0 Z" fill="#FFB800" />
  </g>
</svg>
