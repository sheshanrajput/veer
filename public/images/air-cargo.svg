<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C2FF" />
      <stop offset="100%" stop-color="#0057FF" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
  </g>
  <!-- Airplane Graphic -->
  <g transform="translate(100, 80) scale(1.1)">
    <!-- Jet trail -->
    <path d="M5,100 L30,95 L10,80 L-10,90 Z" fill="#00C2FF" opacity="0.1" />
    <!-- Wings -->
    <path d="M75,5 L100,60 L80,60 Z" fill="#FFB800" />
    <path d="M75,115 L100,60 L80,60 Z" fill="#FFB800" />
    <!-- Fuselage -->
    <path d="M10,60 L140,50 C170,50 180,60 190,60 C180,60 170,70 140,70 Z" fill="url(#planeGrad)" />
    <!-- Windows -->
    <rect x="130" y="56" width="10" height="3" fill="#ffffff" rx="1" />
    <rect x="110" y="56" width="10" height="3" fill="#ffffff" rx="1" opacity="0.8" />
    <rect x="90" y="56" width="10" height="3" fill="#ffffff" rx="1" opacity="0.8" />
    <!-- Tail Fin -->
    <path d="M20,60 L10,20 L35,20 L40,60 Z" fill="#ffffff" />
  </g>
</svg>
