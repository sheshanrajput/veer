<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB800" />
      <stop offset="100%" stop-color="#FF6B00" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
  </g>
  <!-- Packaging Scene -->
  <g transform="translate(140, 90)">
    <!-- Main Box -->
    <rect x="20" y="30" width="80" height="80" rx="4" fill="url(#boxGrad)" />
    <!-- Box Flaps Open -->
    <path d="M20,30 L0,10 L30,10 L20,30 Z" fill="#CC9300" />
    <path d="M100,30 L120,10 L90,10 L100,30 Z" fill="#CC9300" />
    <!-- Packing Tape Roll -->
    <circle cx="85" cy="20" r="18" fill="#ffffff" stroke="#00C2FF" stroke-width="4" />
    <circle cx="85" cy="20" r="10" fill="#07182E" />
    <!-- Tape Strip -->
    <path d="M85,38 L85,80 L20,80" fill="none" stroke="#00C2FF" stroke-width="8" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>
