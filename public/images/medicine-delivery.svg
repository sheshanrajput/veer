<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="medicalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="100%" stop-color="#FF2D55" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
  </g>
  <!-- Medical Cross / Shield / Pill Graphics -->
  <g transform="translate(130, 80)">
    <!-- Pill Bottle -->
    <rect x="30" y="45" width="50" height="70" rx="6" fill="#ffffff" />
    <rect x="25" y="35" width="60" height="10" rx="2" fill="#0057FF" />
    <!-- Cross on Bottle -->
    <path d="M50,70 L60,70 M55,65 L55,75" fill="none" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" />
    <!-- Flying Capsule -->
    <g transform="translate(85, 30) rotate(45)">
      <rect x="0" y="0" width="16" height="36" rx="8" fill="#FF3B30" />
      <rect x="0" y="18" width="16" height="18" rx="0" fill="#ffffff" />
      <rect x="0" y="0" width="16" height="36" rx="8" fill="none" stroke="#07182E" stroke-width="1.5" />
    </g>
    <!-- Motion trails -->
    <line x1="10" y1="40" x2="50" y2="40" stroke="#00C2FF" stroke-width="2" stroke-linecap="round" opacity="0.5" />
    <line x1="0" y1="60" x2="30" y2="60" stroke="#00C2FF" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>
