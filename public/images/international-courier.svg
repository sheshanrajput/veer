<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0057FF" />
      <stop offset="100%" stop-color="#00C2FF" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
  </g>
  <!-- Globe Outline -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="url(#globeGrad)" stroke-width="2" stroke-opacity="0.5" />
  <ellipse cx="200" cy="150" rx="80" ry="30" fill="none" stroke="url(#globeGrad)" stroke-width="1.5" stroke-opacity="0.4" />
  <ellipse cx="200" cy="150" rx="30" ry="80" fill="none" stroke="url(#globeGrad)" stroke-width="1.5" stroke-opacity="0.4" />
  <line x1="120" y1="150" x2="280" y2="150" stroke="url(#globeGrad)" stroke-width="1.5" stroke-opacity="0.4" />
  <line x1="200" y1="70" x2="200" y2="230" stroke="url(#globeGrad)" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Shipping Box -->
  <g transform="translate(160, 110)">
    <!-- Top -->
    <path d="M40,10 L75,25 L40,40 L5,25 Z" fill="#FFB800" opacity="0.9" />
    <!-- Left -->
    <path d="M5,25 L40,40 L40,75 L5,60 Z" fill="#CC9300" />
    <!-- Right -->
    <path d="M40,40 L75,25 L75,60 L40,75 Z" fill="#AA7B00" />
    <!-- Tape / Detail -->
    <path d="M40,25 L57.5,17.5 M40,25 L22.5,17.5" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6" />
  </g>
</svg>
