<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0057FF" />
      <stop offset="100%" stop-color="#00C2FF" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <!-- Speed lines in background -->
  <g stroke="#00C2FF" stroke-opacity="0.15" stroke-width="2">
    <line x1="20" y1="120" x2="120" y2="120" />
    <line x1="10" y1="150" x2="160" y2="150" />
    <line x1="30" y1="180" x2="100" y2="180" />
  </g>
  <!-- Delivery Van -->
  <g transform="translate(110, 90)">
    <!-- Cabin Front -->
    <path d="M120,40 L160,40 Q170,40 172,50 L178,75 L120,75 Z" fill="#ffffff" />
    <!-- Cabin Window -->
    <path d="M130,45 L155,45 L160,58 L130,58 Z" fill="#07182E" />
    <!-- Cargo Box -->
    <rect x="20" y="20" width="100" height="55" rx="4" fill="url(#truckGrad)" />
    <!-- Wheels -->
    <circle cx="45" cy="80" r="12" fill="#07182E" stroke="#ffffff" stroke-width="2" />
    <circle cx="140" cy="80" r="12" fill="#07182E" stroke="#ffffff" stroke-width="2" />
    <!-- Brand Line on Cargo -->
    <text x="70" y="52" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="black" text-anchor="middle" letter-spacing="1">VEER</text>
  </g>
</svg>
