<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F294A" />
      <stop offset="100%" stop-color="#07182E" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C2FF" />
      <stop offset="100%" stop-color="#0057FF" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cardGrad)" />
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="75" x2="400" y2="75" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="225" x2="400" y2="225" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
  </g>
  <!-- Flying Priority Envelopes -->
  <g transform="translate(130, 90)">
    <!-- Back Envelope -->
    <rect x="20" y="20" width="120" height="80" rx="4" fill="#0057FF" opacity="0.5" transform="rotate(-10)" />
    <!-- Front Envelope -->
    <g transform="rotate(-5)">
      <rect x="30" y="30" width="120" height="80" rx="4" fill="#ffffff" />
      <!-- Envelope flap line -->
      <path d="M30,30 L90,70 L150,30" fill="none" stroke="#00C2FF" stroke-width="2" />
      <!-- Stamp -->
      <rect x="125" y="40" width="15" height="15" fill="#FFB800" rx="1" />
      <!-- Address lines -->
      <line x1="45" y1="75" x2="105" y2="75" stroke="#07182E" stroke-dasharray="3,3" stroke-width="2" opacity="0.3" />
      <line x1="45" y1="85" x2="115" y2="85" stroke="#07182E" stroke-dasharray="3,3" stroke-width="2" opacity="0.3" />
      <line x1="45" y1="95" x2="85" y2="95" stroke="#07182E" stroke-dasharray="3,3" stroke-width="2" opacity="0.3" />
    </g>
  </g>
</svg>
